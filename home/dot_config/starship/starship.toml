format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
${custom.shpool}\
${custom.ssh}\
${custom.network}\
$line_break\
$python\
${custom.prompt_local}\
${custom.prompt_ssh}"""

[directory]
style = "blue"
truncation_length = 0
truncate_to_repo = false
home_symbol = "~"
use_os_path_sep = true
fish_style_pwd_dir_length = 1 
substitutions = { "/var/home/tom" = "~" }

[character]
success_symbol = "[❯](#DA7756)"
error_symbol = "[❯](red)"
vicmd_symbol = "[❮](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](#F47B85) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "​"
untracked = "​"
modified = "​"
staged = "​"
renamed = "​"
deleted = "​"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"

[custom.shpool]
command = 'echo $SHPOOL_SESSION_NAME'
when = 'test -n "$SHPOOL_SESSION_NAME"'
format = '[$output]($style) '
style = 'bright-black'
shell = ['fish']

[custom.ssh]
command = 'echo "ssh"'
when = 'test -n "$SSH_CONNECTION"'
format = '[$output]($style) '
style = 'yellow'
shell = ['fish']

[custom.network]
command = '''
if string match -q "100.*" (string split " " $SSH_CONNECTION)[1]
    echo "tailscale"
else
    echo "lan"
end
'''
when = 'test -n "$SSH_CONNECTION"'
format = '[$output]($style) '
style = 'bright-black'
shell = ['fish']

# Prompt char: orange ❯ locally, green ❯ over SSH so the remote shell is
# unmistakable. Replaces the [character] module in $format; [character] is
# kept below as reference but isn't rendered anymore.
[custom.prompt_local]
command = 'echo "❯"'
when = 'test -z "$SSH_CONNECTION"'
format = '[$output]($style)'
style = '#DA7756'
shell = ['fish']

[custom.prompt_ssh]
command = 'echo "❯"'
when = 'test -n "$SSH_CONNECTION"'
format = '[$output]($style)'
style = 'bold green'
shell = ['fish']
