# Font configuration
font_family      Maple Mono Normal NF
bold_font        Maple Mono Normal NF Bold
italic_font      Maple Mono Normal NF Italic
bold_italic_font Maple Mono Normal NF Bold Italic
font_size        14.0
disable_ligatures never

# Cursor
cursor_blink_interval 0

# Cursor trail (trailmarks)
cursor_trail 1
cursor_trail_decay 0.15 0.4
cursor_trail_start_threshold 3
cursor_trail_color #70B8FF

# Padding around the text area
window_padding_width 10

detect_urls yes
open_url_with default
underline_hyperlinks always
confirm_os_window_close 0
scrollback_lines 100000
enable_audio_bell no
copy_on_select clipboard
#skip_trailing_lines smart
remember_window_size  no

# Custom key mapping for font resizing without the 'Shift' key
map ctrl+equal increase_font_size
map ctrl+minus decrease_font_size

# Annex sidebar picker (dotfiles#50). Ctrl+B / Ctrl+Shift+B toggle a hidden,
# self-terminating RIGHT split (~25 cols) running nvim-tree as a file picker.
# When the focused window's foreground process is nvim, the kitten PASSES THE
# KEY THROUGH instead of toggling (Ctrl+B -> NvimTreeFocus \x02, Ctrl+Shift+B ->
# NvimTreeToggle \x1b[66;5u) — preserving today's in-nvim behavior. The old
# `send_text \x1b[66;5u` map is now handled inside the kitten's pass-through.
# `--location=vsplit` only takes effect under the splits layout.
enabled_layouts splits
unmap ctrl+shift+b
map ctrl+b       kitten annex_toggle.py b
map ctrl+shift+b kitten annex_toggle.py shift

# Ctrl+G = compose + view (Tom 2026-07-15 merge). One press does BOTH: opens
# Claude's/pi's OWN native Ctrl+G->$EDITOR composer (nvim-annex, blocking — edits
# the harness's tempfile IN PLACE so Claude re-maps its [Pasted text #N] /
# [Image #N] tokens on read-back: pasted text + clipboard images SURVIVE) AND
# pops the Ctrl+Shift+O transcript viewer in a separate window so the
# conversation stays visible while nvim has the alt-screen. The kitten
# (annex_view.py in `compose` mode) launches/dedups the viewer, then ALWAYS
# forwards raw Ctrl+G (0x07): in the harness that fires the native composer; in
# nvim/shell it's a normal Ctrl+G. Because every press is still forwarded, this
# does NOT regress "Ctrl+G reaches the app."
#
# This RETIRES the old Ctrl+Shift+G overlay composer (annex_ctrlg.py, dotfiles#77):
# the overlay's only purpose was to dodge the alt-screen blank, but it couldn't
# preserve paste/image tokens (screen-scrape + re-typed send-text) — and now the
# viewer window covers the "keep the chat visible" need, so the strictly-better
# native composer wins and the overlay is unbound. (annex_ctrlg.py is kept on
# disk, unmapped, as a deprecated reference; no `unmap` needed — nothing stock
# binds Ctrl+Shift+G.)
map ctrl+g kitten annex_view.py compose

# Ctrl+SHIFT+O transcript viewer: an always-available SEPARATE kitty OS-window
# for scrolling/searching Claude Code conversation history that never blanks
# the live chat. Claude Code's OWN Ctrl+O (app:toggleTranscript) re-renders the
# full transcript from its in-memory conversation array, but only by replacing
# the CURRENT alt-screen — scrolling it means losing sight of, and being
# unable to type into, the live chat. That in-memory array is persisted live
# to <CLAUDE_CONFIG_DIR or ~/.claude>/projects/<cwd-slug>/<sessionId>.jsonl, so
# this kitten resolves which sessionId belongs to the FOCUSED harness window
# (reading the live <root>/sessions/*.json registry, cwd-matched, dead-pid- and
# missing-jsonl-filtered, tied-broken busy-then-newest — see annex_view.py's
# resolve_session) and launches a SECOND, independent `claude --resume <id>`
# process in a new OS window: Claude re-renders that same transcript with its
# OWN renderer (native Ctrl+O, native inline images, native search) untouched
# by anything in this repo, in a window that can be scrolled without touching
# the original at all.
#   * This is the VIEW-ONLY chord; Ctrl+G (above) does compose + view. Write
#     safety: `--no-session-persistence` turned out print-mode-only (errors
#     under interactive --resume), so the kitten resumes a THROWAWAY COPY of the
#     jsonl instead (annex_view.py:_snapshot_transcript) — the live original is
#     physically untouched. The large-session "resume from summary / as-is" menu
#     is suppressed structurally by CLAUDE_CODE_RESUME_TOKEN_THRESHOLD=999999999
#     in the launch payload (resumes as-is, zero keystrokes, zero tokens); and
#     the payload best-effort auto-sends Ctrl+O so it lands in the transcript
#     view. See annex_view.py's header/_act for the full writeup.
#   * Press Ctrl+Shift+O again while focused INSIDE the viewer's own OS window
#     to dismiss it (tab-scoped var:annex_view=1 match, mirrors
#     annex_toggle.py's _annex_window_in_tab) — this does NOT reach across OS
#     windows from the original harness's tab, since the viewer is its own
#     `--type=os-window`, not a split in the same tab.
#   * READ-ONLY: this viewer never sends text back to any window, so
#     annex-deliver.lua / send-text / KITTY_HARNESS_* plumbing are not
#     involved at all.
#   * In a NON-harness window (nvim/shell/fzf) Ctrl+Shift+O is a no-op
#     (swallowed) — there is no safe raw byte to forward for this chord and no
#     native fallback to degrade to, unlike Ctrl+Shift+G's Ctrl+G/$EDITOR
#     graceful-degradation path. Any resolution failure (no live session for
#     this cwd, remote control down, ...) SWALLOWS the same way. No default
#     kitty binding exists on Ctrl+Shift+O (the only stock reference is the
#     commented-out `pass_selection_to_program` example further below), so no
#     `unmap` is needed first.
map ctrl+shift+o kitten annex_view.py

### Scrollback buffer from https://github.com/mikesmithgh/kitty-scrollback.nvim/blob/main/README.md#%EF%B8%8F-setup
# Enable remote control for Kitty
allow_remote_control yes
# Set up a Unix socket for communication
# Abstract socket, unique per kitty instance — ensures `kitty @` from a shell
# spawned by a given kitty reaches THAT kitty (rather than whichever process
# won the race for /tmp/kitty). Required for multi-window workflows where
# different kitty instances each need their own remote-control endpoint
# (e.g. `desk` setting window-title on the new SSH kitty spawned from niri).
listen_on unix:@kitty-{kitty_pid}
# Enable shell integration for command tracking
shell_integration enabled
# Alias for kitty-scrollback.nvim
# NIX-MIGRATION: nvim-sweep.md §9 — the kitten no longer lives in the lazy.nvim
# clone dir (~/.local/share/nvim/lazy/...): lazy-nix-helper resolves the plugin
# from /nix/store, so that path stays empty. home-manager emits the fragment
# with the store path baked in — at a NEUTRAL path (§9 fallback): kitty/ is a
# whole-dir out-of-store symlink, so a managed file can't live inside it.
# kitty expands env vars in include paths.
include ${HOME}/.config/kitty-scrollback-nix.conf
# Key mappings to browse scrollback buffer in Neovim
map kitty_mod+h kitty_scrollback_nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Mouse mapping to view clicked command output in Neovim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output
