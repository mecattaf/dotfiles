# vim:ft=kitty

# Font configuration

# --- old block ---
# to revert to jetbrains mono, clear ONE SINGLE "#" at the start of each line in this block
# font_family      JetBrainsMono Nerd Font
# #font_family      jetbrains mono nerd font
# #bold_font        auto
