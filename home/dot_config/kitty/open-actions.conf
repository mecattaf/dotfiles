# Open text files in a new OS window running nvim
protocol file
mime text/*
action launch --type=os-window --cwd=current nvim -- ${FILE_PATH}

# Also handle common code files that might not register as text/*
protocol file
ext py,lua,js,ts,tsx,jsx,rs,go,sh,conf,yaml,yml,toml,json,md
action launch --type=os-window --cwd=current nvim -- ${FILE_PATH}
