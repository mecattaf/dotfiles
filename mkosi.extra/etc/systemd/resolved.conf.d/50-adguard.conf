# 50-adguard.conf — route systemd-resolved through AdGuard Home
#
# Sends this host's own DNS queries to AdGuard at 127.0.0.1:53 (AdGuard
# binds 0.0.0.0 via its quadlet's PublishPort, so loopback works).
#
# Tailscale's per-link DNS config keeps winning for *.ts.net via 100.100.100.100,
# because per-link routes beat the global DNS=. MagicDNS stays functional.
#
# Pairs with: NetworkManager/dnsmasq-shared.d/00-adguard.conf
[Resolve]
DNS=127.0.0.1
