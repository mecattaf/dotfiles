# 00-adguard.conf — NetworkManager dnsmasq-shared.d drop-in
#
# Frees port 53 on the shared subnet's gateway IP so AdGuard Home (rootless
# podman quadlet) can bind it. NM's built-in dnsmasq stays alive for DHCP
# only, and pushes the gateway IP (= AdGuard) as the resolver to clients.
#
# Pairs with:
#   - resolved.conf.d/50-adguard.conf  (this host uses AdGuard too)
#   - nftables/dns-hijack.nft          (catches hardcoded-DNS clients)

# Disable DNS in this dnsmasq instance — AdGuard owns :53.
port=0

# DHCP option 6: hand BE550 wifi clients the gateway IP as their resolver.
# 10.42.0.1 is NM's canonical shared-mode gateway; AdGuard is reachable
# there via its quadlet's PublishPort=53:53 (binds 0.0.0.0).
dhcp-option=6,10.42.0.1
