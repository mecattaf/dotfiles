# 01-be550-pin.conf — pin the TP-Link Archer BE550's DHCP lease
#
# NM's shared-mode dnsmasq hands the BE550 a DHCP lease for the management
# interface (it's in AP mode but still requests an IP for its own admin UI
# and to be reachable for SMB). Without a pin the lease can land anywhere
# in 10.42.0.10–254, which would break var-mnt-nas.mount's hardcoded What=.
#
# This pins the BE550's MAC to 10.42.0.2 (just above the gateway, below
# the dynamic range, so it's stable forever).
#
# **If you replace the BE550** (RMA, factory reset that changes MAC,
# different unit), update the MAC below. Find the new MAC after the new
# BE550 is online with:
#   ip neigh show dev enp191s0
# It'll be the only `lladdr` entry that isn't a known wifi client.
dhcp-host=98:03:8e:6b:61:e2,be550,10.42.0.2,infinite
